name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
        default: patch
      custom_version:
        description: "Custom version (only when type is 'custom', e.g. 1.2.3)"
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.version_type }}" = "custom" ] && [ -z "${{ inputs.custom_version }}" ]; then
            echo "::error::Custom version is required when version_type is 'custom'"
            exit 1
          fi
          if [ "${{ inputs.version_type }}" = "custom" ]; then
            if ! echo "${{ inputs.custom_version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Custom version must be in semver format (e.g. 1.2.3)"
              exit 1
            fi
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Determine versions
        id: versions
        run: |
          PREV_VERSION=$(node -p "require('./package.json').version")
          echo "previous_version=$PREV_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.version_type }}" = "custom" ]; then
            npm version "${{ inputs.custom_version }}" --no-git-tag-version --allow-same-version
          else
            npm version "${{ inputs.version_type }}" --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: v${{ steps.versions.outputs.version }}"
          git tag -a "v${{ steps.versions.outputs.version }}" -m "v${{ steps.versions.outputs.version }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "v${{ steps.versions.outputs.previous_version }}" >/dev/null 2>&1; then
            gh release create "v${{ steps.versions.outputs.version }}" \
              --title "v${{ steps.versions.outputs.version }}" \
              --generate-notes \
              --notes-start-tag "v${{ steps.versions.outputs.previous_version }}"
          else
            gh release create "v${{ steps.versions.outputs.version }}" \
              --title "v${{ steps.versions.outputs.version }}" \
              --generate-notes
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_DEPLOYMENT_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "❌ **RELEASE FAILED**\n@xpoz/ai-sdk@${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
